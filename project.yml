name: UFOWatch
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    exactVersion: 11.13.0

settings:
  base:
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.UFOWatch
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic

targets:
  UFOWatch:
    type: application
    platform: iOS
    sources: [UFOWatch]
    dependencies:
      - package: GoogleMobileAds
    settings:
      base:
        INFOPLIST_FILE: UFOWatch/Info.plist
        PRODUCT_NAME: UFOWatch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: UFOWatch/Info.plist
      properties:
        CFBundleName: PURSUE
        CFBundleDisplayName: PURSUE
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        GADApplicationIdentifier: ca-app-pub-9404799280370656~9126277059
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
        NSUserTrackingUsageDescription: 関連性の高い広告を表示するためにトラッキングを使用します。
        ITSAppUsesNonExemptEncryption: false
        BGTaskSchedulerPermittedIdentifiers:
          - com.tokyonasu.UFOWatch.refresh
        UIBackgroundModes:
          - fetch
